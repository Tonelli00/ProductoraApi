<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Reservas — ProductorApi</title>
  <link rel="icon" type="image/png" href="./Assets/ApiLogo.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script type="module" src="./main.js"></script>

  
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
 
  <header>
    <nav class="flex items-center px-8 py-4 bg-white border-b border-gray-200 sticky top-0 z-50">
      <div class="w-1/3 text-lg font-bold tracking-tight text-black">
        <a href="index.html">ProductorApi</a>
      </div>
      <ul class="w-1/3 flex justify-center items-center text-sm text-gray-500">
        <li>
          <a href="Events.html" class="uppercase tracking-widest text-xs font-medium hover:text-black transition">
            Eventos
          </a>
        </li>
      </ul>
      
    </nav>
  </header>
 
  <main class="flex-1">
 
    <section class="border-b border-gray-200 bg-white">
      <div class="max-w-6xl mx-auto px-8 py-10 flex flex-col md:flex-row md:items-end md:justify-between gap-4">
        <div class="space-y-2">
          <p class="text-xs uppercase tracking-widest text-gray-400 flex items-center gap-2">
            <span class="inline-block w-6 h-px bg-gray-400"></span>
            Mi cuenta
          </p>
          <h1 class="text-4xl font-bold tracking-tight text-black serif">
            Mis <span class="italic font-normal">reservas</span>
          </h1>
          <p class="text-gray-500 font-light text-sm">Revisá el estado de todas tus entradas y reservas.</p>
        </div>
        
      </div>
    </section>
 
    <section class="border-b border-gray-200 bg-white">
      <div class="max-w-6xl mx-auto px-8">
        <div class="grid grid-cols-3 divide-x divide-gray-200">
          <div class="py-5 px-4 text-center">
            <p class="text-2xl font-bold text-black" id="total-reservation">—</p>
            <p class="text-xs uppercase tracking-widest text-gray-400 mt-0.5">Total</p>
          </div>
          <div class="py-5 px-4 text-center">
            <p class="text-2xl font-bold text-green-600" id="confirmed-reservation">—</p>
            <p class="text-xs uppercase tracking-widest text-gray-400 mt-0.5">Confirmadas</p>
          </div>
          <div class="py-5 px-4 text-center">
            <p class="text-2xl font-bold text-amber-500" id="pending-reservation">—</p>
            <p class="text-xs uppercase tracking-widest text-gray-400 mt-0.5">Pendientes</p>
          </div>
        </div>
      </div>
    </section>
 
    <section class="max-w-6xl mx-auto px-8 py-10 space-y-6">
      <div id="reservations-container" class="space-y-3">
        <div class="skeleton h-28 w-full rounded-lg"></div>
        <div class="skeleton h-28 w-full rounded-lg"></div>
        <div class="skeleton h-28 w-full rounded-lg"></div>
      </div>
       <div id="empty-state" class="hidden text-center py-20 space-y-3">

          <p class="font-semibold text-gray-700">No tenés reservas</p>
          <p class="text-sm text-gray-400">Explorá los eventos disponibles y reservá tu lugar.</p>
          <a href="Events.html" class="inline-block mt-2 text-sm underline underline-offset-4 text-gray-500 hover:text-black transition">
            Explorar eventos →
          </a>
        </div>
 
    </section>
  </main>
 
  <footer class="bg-black mt-auto">
    <div class="max-w-6xl mx-auto px-8 py-6 flex justify-between items-center text-sm">
      <span class="text-white font-semibold tracking-tight">ProductorApi</span>
      <span class="text-gray-500 text-xs">© 2026 — Grupo 03 UNAJ</span>
    </div>
  </footer>
 

  <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
    <div class="bg-white rounded-xl w-full max-w-md shadow-2xl overflow-hidden">
      <div id="modal-content"></div>
    </div>
  </div>
