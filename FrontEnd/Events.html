<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="./main.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen">
    <header>
        <nav class="flex items-center justify-between px-8 py-4 bg-white border-b border-gray-200 sticky top-0 z-50">
            <div class="w-1/3 text-lg font-bold tracking-tight text-black">
                <a href="index.html">ProductorApi</a>
            </div>
            <div class="w-1/3 flex justify-end items-center gap-4">
                <button id="btn-login" class="text-sm text-gray-500 hover:text-black transition">
                    Iniciar sesión
                </button>
                <button id="btn-register" class="px-4 py-2 text-sm bg-black text-white rounded hover:bg-gray-800 transition">
                    Registrarse
                </button>
            </div>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto p-6 space-y-10">
        <div>
            <h1 class="text-center font-bold text-4xl">Descubrí todos los eventos programados</h1>
        </div>
        <section class="space-y-4">
            <div class="flex items-center justify-between mt-20">
                <h2 class="text-xl font-semibold">Eventos programados</h2>
                <span class="text-sm text-gray-400 font-semibold">Eventos actualizados en vivo</span>
            </div>

            <div id="events" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

            <div class="flex items-center justify-center gap-3 pt-4">
                <button id="btn-prev"
                    class="px-4 py-2 text-sm border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition">
                    ← Anterior
                </button>
                <span id="page-info" class="text-sm text-gray-400">Página 1</span>
                <button id="btn-next"
                    class="px-4 py-2 text-sm border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition">
                    Siguiente →
                </button>
            </div>
        </section>
    </main>
</body>
</html>
